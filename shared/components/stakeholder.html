<!-- stakeholder.html — Stakeholder card component -->
<!-- Used for both EP stakeholders and CP attendees -->
<!-- Variables: {name}, {title}, {stance_badge}, {role_badge}, {fields}, {how_to_win} -->

<div class="stakeholder-card">
  <div class="badges">
    {badges}
  </div>
  <div class="name">{name}</div>
  <div class="title">{title}</div>
  {fields}
  <div class="how-to-win"><strong>🎯 {goal_label}:</strong> {goal_text}</div>
</div>
