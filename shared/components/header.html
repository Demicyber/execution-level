<!-- header.html — Document header component -->
<!-- Used by html_renderer.py to generate the doc header -->
<!-- Variables: {doc_type_label}, {customer}, {subtitle}, {meta_badges} -->

<div class="doc-header">
  <div class="doc-type-label">{doc_type_label}</div>
  <div class="doc-title">{customer}</div>
  <div class="doc-subtitle">{subtitle}</div>
  <div class="doc-meta">
    {meta_badges}
  </div>
</div>
