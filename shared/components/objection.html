<!-- objection.html — Objection card component (CP) -->
<!-- Variables: {category_class}, {title}, {category_label}, {likely_from}, {response}, {plan_b} -->

<div class="objection-card {category_class}">
  <div class="objection-header">
    <span class="objection-title">{title}</span>
    <span class="category-badge {category_class}">{category_label}</span>
  </div>
  <div class="field" style="font-size:12px; color:var(--color-text-secondary);">Likely From: {likely_from}</div>
  <div class="response"><strong>Response:</strong> {response}</div>
  <div class="plan-b"><strong>Plan B:</strong> {plan_b}</div>
</div>
